apiVersion: apps/v1
kind: Deployment
metadata:
  name: __RELEASE_NAME__
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: ether-chat-backend
    app.kubernetes.io/instance: __RELEASE_NAME__
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ether-chat-backend
      app.kubernetes.io/instance: __RELEASE_NAME__
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ether-chat-backend
        app.kubernetes.io/instance: __RELEASE_NAME__
    spec:
      containers:
        - name: app
          image: __IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: AUTH_DB_PATH
              value: "/data/auth.db"
            - name: CHAT_DB_PATH
              value: "/data/chat.db"
            - name: AI_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: __RELEASE_NAME__-app-env
                  key: AI_PROVIDER
            - name: DEEPSEEK_MODEL
              valueFrom:
                secretKeyRef:
                  name: __RELEASE_NAME__-app-env
                  key: DEEPSEEK_MODEL
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: __RELEASE_NAME__-app-env
                  key: DEEPSEEK_API_KEY
                  optional: true
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: __RELEASE_NAME__-app-env
                  key: JWT_SECRET
          volumeMounts:
            - name: app-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: app-data
          emptyDir: {}
